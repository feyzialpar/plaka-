<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plaka Kayıt</title>
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f2f4f8;
            color: #334155;
            padding: 16px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            position: relative;
        }

        /* Başlık Alanı */
        .app-title {
            font-size: 20px;
            font-weight: 700;
            color: #1e293b;
            text-align: center;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Cihaz Bilgi Çubuğu */
        .device-info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #64748b;
            background: #ffffff;
            padding: 10px 14px;
            border-radius: 12px;
            margin-bottom: 14px;
            border: 1px solid #e2e8f0;
        }

        .change-device-btn {
            background: none;
            border: none;
            color: #2563eb;
            font-weight: 700;
            cursor: pointer;
            font-size: 11px;
        }

        /* Kart Yapıları */
        .card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 14px;
        }

        .card-title {
            font-size: 12px;
            font-weight: 700;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* İnput Kutucukları */
        input[type="text"],
        input[type="number"],
        input[type="date"],
        textarea {
            width: 100%;
            height: 46px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 0 14px;
            font-size: 15px;
            color: #1e293b;
            outline: none;
        }

        textarea {
            height: auto;
            padding: 10px 14px;
            resize: vertical;
        }

        input[type="date"] {
            color: #2563eb;
            font-weight: 600;
            text-align: center;
            background-color: #f1f5f9;
            border: none;
        }

        /* Radio Seçenek Kutuları */
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px 14px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            color: #1e293b;
        }

        .radio-option input[type="radio"] {
            appearance: none;
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid #cbd5e1;
            border-radius: 50%;
            margin-right: 12px;
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .radio-option input[type="radio"]:checked {
            border-color: #475569;
        }

        .radio-option input[type="radio"]:checked::after {
            content: "";
            width: 10px;
            height: 10px;
            background-color: #475569;
            border-radius: 50%;
        }

        .other-input {
            display: none;
            margin-top: 8px;
            border-style: dashed !important;
            background: #f0f7ff !important;
        }

        /* Plaka ve Kilo Satır Yapısı */
        .plaka-kilo-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
        }

        .plaka-kilo-row input[type="text"] {
            min-width: 0;
        }

        .remove-btn {
            background: #ef4444;
            color: white;
            border: none;
            width: 46px;
            height: 46px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            flex-shrink: 0;
        }

        .add-row-btn {
            background: #ffffff;
            color: #475569;
            border: 2px dashed #cbd5e1;
            padding: 12px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            margin-top: 4px;
            font-size: 14px;
        }

        .field-inputs {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Turuncu Kaydet Butonu */
        .btn-submit {
            width: 100%;
            height: 52px;
            background-color: #e67e22;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 6px -1px rgba(230, 126, 34, 0.2);
        }

        .btn-submit:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        /* Son Kayıt Durumu Kutusu */
        .status-box { 
            margin-top: 14px; 
            padding: 12px 14px; 
            border-radius: 12px; 
            font-size: 14px; 
            display: none; 
            align-items: center; 
            gap: 10px; 
            background: #ffffff;
            border: 1px solid #e2e8f0;
        }
        .status-box.success { background: #f0fdf4; color: #166534; border-color: #bbf7d0; display: flex; }
        .status-box.offline { background: #fffbeb; color: #92400e; border-color: #fde68a; display: flex; }
        .status-icon { font-size: 18px; display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0; }
        .status-box.success .status-icon { background: #dcfce7; }
        .status-box.offline .status-icon { background: #fef3c7; }
        .status-content { flex: 1; display: flex; flex-direction: column; }
        .status-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.75; font-weight: 700; }
        .status-value { font-weight: 700; font-size: 13px; margin-top: 2px; }

        /* Anlık Bildirim (Toast) Kutusu - Süper Hızlı */
        .toast-notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #10b981;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 14px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2);
            z-index: 10000;
            opacity: 0;
            transition: all 0.15s ease-out;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: none;
        }
        .toast-notification.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Modal Pencere */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(4px);
            display: none; justify-content: center; align-items: center; z-index: 9999; padding: 20px;
        }
        .modal-card {
            background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 380px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); text-align: center;
        }
        .modal-card h2 { margin-top: 0; color: #1e293b; font-size: 20px; }
        .modal-card p { color: #64748b; font-size: 14px; margin-bottom: 20px; line-height: 1.4; }
        .modal-btn {
            background: #2563eb; color: white; border: none; padding: 14px;
            width: 100%; border-radius: 12px; font-weight: 700; font-size: 16px; margin-top: 15px; cursor: pointer;
        }
    </style>
</head>
<body>

<!-- ANLIK BİLDİRİM BALONCUĞU -->
<div id="toast" class="toast-notification">
    <span>✅</span> <span id="toastMsg">Kaydedildi!</span>
</div>

<!-- CİHAZ MODAL PENCERESİ -->
<div id="deviceModal" class="modal-overlay">
    <div class="modal-card">
        <h2>📱 Cihaz Tanımlama</h2>
        <p>Bu cihazdan yapılan tüm kayıtların Google Excel'de ayrı gruplanması için cihaza bir isim verin.</p>
        <input type="text" id="modalCihazInput" placeholder="Örn: Kantar 1, Ahmet Telefon">
        <button class="modal-btn" onclick="cihazAdiniKaydet()">CİHAZI KAYDET VE BAŞLA</button>
    </div>
</div>

<div class="container">
    <div class="device-info-bar">
        <span>📱 Cihaz: <strong id="activeDeviceName">-</strong></span>
        <button class="change-device-btn" onclick="cihazAdiniSifirla()">İsmi Değiştir</button>
    </div>

    <div class="app-title">
        🚛 Plaka Kayıt
    </div>

    <!-- TARİH -->
    <div class="card">
        <div class="card-title">📅 TARİH</div>
        <input type="date" id="tarih">
    </div>

    <!-- PLAKA & KİLO -->
    <div class="card">
        <div class="card-title">🔢 PLAKA & ⚖️ KİLO</div>
        <div id="plakaKiloContainer">
            <div class="plaka-kilo-row">
                <input type="text" class="plaka-input" placeholder="34ABC123" style="text-transform:uppercase; font-weight:bold; flex: 1.2;">
                <input type="text" class="kilo-input" placeholder="Örn: 25.400" style="flex: 1;">
            </div>
        </div>
        <button type="button" class="add-row-btn" onclick="satirEkle()">➕ Başka Plaka Ekle</button>
    </div>

    <!-- FABRİKA -->
    <div class="card">
        <div class="card-title">🏭 FABRİKA</div>
        <div class="radio-group">
            <label class="radio-option"><input type="radio" name="fabrika" value="İpek" onclick="toggle('fabrikaOther', false)"> İpek</label>
            <label class="radio-option"><input type="radio" name="fabrika" value="Tamek" onclick="toggle('fabrikaOther', false)"> Tamek</label>
            <label class="radio-option"><input type="radio" name="fabrika" value="Assan" onclick="toggle('fabrikaOther', false)"> Assan</label>
            <label class="radio-option"><input type="radio" name="fabrika" value="Diğer" onclick="toggle('fabrikaOther', true)"> Diğer</label>
            <input type="text" id="fabrikaOther" class="other-input" placeholder="Fabrika adı">
        </div>
    </div>

    <!-- FİYAT -->
    <div class="card">
        <div class="card-title">💰 FİYAT</div>
        <div class="radio-group">
            <label class="radio-option"><input type="radio" name="fiyatTur" value="Sözleşmeli" onclick="toggle('fiyatOther', false)"> Sözleşmeli</label>
            <label class="radio-option"><input type="radio" name="fiyatTur" value="Serbest" onclick="toggle('fiyatOther', true)"> Serbest (Fiyat Gir)</label>
            <input type="text" id="fiyatOther" class="other-input" placeholder="Fiyat ₺ (Örn: 4.20)">
        </div>
    </div>

    <!-- ŞAHIS -->
    <div class="card">
        <div class="card-title">👤 ŞAHIS</div>
        <div class="radio-group">
            <label class="radio-option"><input type="radio" name="sahis" value="Cevabettin" onclick="toggle('sahisOther', false)"> Cevabettin</label>
            <label class="radio-option"><input type="radio" name="sahis" value="Hikmet" onclick="toggle('sahisOther', false)"> Hikmet</label>
            <label class="radio-option"><input type="radio" name="sahis" value="Mehmet Şefik" onclick="toggle('sahisOther', false)"> Mehmet Şefik</label>
            <label class="radio-option"><input type="radio" name="sahis" value="Özgür" onclick="toggle('sahisOther', false)"> Özgür</label>
            <label class="radio-option"><input type="radio" name="sahis" value="Cüneyt" onclick="toggle('sahisOther', false)"> Cüneyt</label>
            <label class="radio-option"><input type="radio" name="sahis" value="Diğer" onclick="toggle('sahisOther', true)"> Diğer</label>
            <input type="text" id="sahisOther" class="other-input" placeholder="Şahıs adı">
        </div>
    </div>

    <!-- TARLA BİLGİLERİ -->
    <div class="card">
        <div class="card-title">🌾 TARLA BİLGİLERİ</div>
        <div class="field-inputs">
            <input type="text" id="tarla" placeholder="Tarla Adı">
            <textarea id="aciklama" rows="2" placeholder="Not..."></textarea>
        </div>
    </div>

    <!-- KAYDET BUTONU -->
    <button class="btn-submit" id="saveBtn" onclick="cokluVeriGonder()">Kaydet</button>

    <!-- SON KAYIT BİLGİSİ -->
    <div id="statusBox" class="status-box">
        <div class="status-icon" id="statusIcon">📌</div>
        <div class="status-content">
            <span class="status-label" id="statusLabel">Son Kayıt</span>
            <span class="status-value" id="statusValue">-</span>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzxsZOIMAz5rTbm5Ski_MSmekCvGovvav9mP4XG2lU-K50sQsaCDcP6vHoQ9lhArzCynA/exec';

    window.onload = function() {
        const tarihKutusu = document.getElementById('tarih');
        const simdi = new Date();
        const offset = simdi.getTimezoneOffset() * 60000; 
        const yerelZaman = new Date(simdi - offset).toISOString().split('T')[0];
        tarihKutusu.value = yerelZaman;

        cihazKontrolEt();
        sonKaydiGoster();
        cevrımdısıVerileriGonder();
    };

    function cihazKontrolEt() {
        const kayitliCihaz = localStorage.getItem('cihazAdi');
        if (!kayitliCihaz) {
            document.getElementById('deviceModal').style.display = 'flex';
        } else {
            document.getElementById('deviceModal').style.display = 'none';
            document.getElementById('activeDeviceName').innerText = kayitliCihaz;
        }
    }

    function cihazAdiniKaydet() {
        const val = document.getElementById('modalCihazInput').value.trim();
        if (!val) return alert("Lütfen cihaz için bir isim yazın!");
        localStorage.setItem('cihazAdi', val);
        cihazKontrolEt();
    }

    function cihazAdiniSifirla() {
        if (confirm("Bu cihazın adını değiştirmek istiyor musunuz?")) {
            localStorage.removeItem('cihazAdi');
            document.getElementById('modalCihazInput').value = '';
            cihazKontrolEt();
        }
    }

    window.addEventListener('online', cevrımdısıVerileriGonder);

    function toggle(id, s) { document.getElementById(id).style.display = s ? 'block' : 'none'; }

    function formatPlaka(p) {
        let t = p.replace(/\s+/g, '').toUpperCase();
        let m = t.match(/^(\d{2})([A-Z]{1,3})(\d{2,4})$/);
        return m ? m[1] + " " + m[2] + " " + m[3] : t;
    }

    function satirEkle() {
        const container = document.getElementById('plakaKiloContainer');
        const newRow = document.createElement('div');
        newRow.className = 'plaka-kilo-row';
        newRow.innerHTML = `
            <input type="text" class="plaka-input" placeholder="Plaka" style="text-transform:uppercase; font-weight:bold; flex: 1.2;">
            <input type="text" class="kilo-input" placeholder="Kilo" style="flex: 1;">
            <button type="button" class="remove-btn" onclick="this.parentElement.remove()">✕</button>
        `;
        container.appendChild(newRow);
    }

    function bildirimGoster(mesaj) {
        const toast = document.getElementById('toast');
        document.getElementById('toastMsg').innerText = mesaj;
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 500); // 0.5 saniyede hızlıca kaybolur
    }

    function sonKaydiGoster() {
        const sonKayit = localStorage.getItem('sonPlakaKayit');
        const statusBox = document.getElementById('statusBox');
        const statusIcon = document.getElementById('statusIcon');
        const statusLabel = document.getElementById('statusLabel');
        const statusValue = document.getElementById('statusValue');

        if (sonKayit) {
            if(sonKayit.includes('[ÇEVRİMDIŞI]')) {
                statusBox.className = "status-box offline";
                statusIcon.innerText = "⏳";
                statusLabel.innerText = "Bekleyen Kayıt (Çevrimdışı)";
                statusValue.innerText = sonKayit.replace(' [ÇEVRİMDIŞI]', '');
            } else {
                statusBox.className = "status-box success";
                statusIcon.innerText = "✅";
                statusLabel.innerText = "Son Kaydedilen";
                statusValue.innerText = sonKayit;
            }
        }
    }

    function cevrımdısıVerileriGonder() {
        const bekleyen = JSON.parse(localStorage.getItem('offlinePlakaKayitlari') || '[]');
        if (bekleyen.length > 0 && navigator.onLine) {
            fetch(scriptURL, { 
                method: 'POST', 
                mode: 'no-cors', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bekleyen) 
            })
            .then(() => {
                localStorage.removeItem('offlinePlakaKayitlari');
                let son = localStorage.getItem('sonPlakaKayit') || '';
                localStorage.setItem('sonPlakaKayit', son.replace(' [ÇEVRİMDIŞI]', ''));
                sonKaydiGoster();
            })
            .catch(err => console.error(err));
        }
    }

    function cokluVeriGonder() {
        const cihazAdiVal = localStorage.getItem('cihazAdi') || 'Bilinmeyen Cihaz';
        
        let f = document.querySelector('input[name="fabrika"]:checked')?.value;
        if(f === "Diğer") f = document.getElementById('fabrikaOther').value;

        let s = document.querySelector('input[name="sahis"]:checked')?.value;
        if(s === "Diğer") s = document.getElementById('sahisOther').value;

        const ft = document.querySelector('input[name="fiyatTur"]:checked')?.value;
        let fsn = ft === "Serbest" ? document.getElementById('fiyatOther').value.toString().replace(/,/g, '.') : ft;

        if(!f || !s || !ft) return alert("Lütfen Fabrika, Fiyat ve Şahıs seçimini yapın!");

        const plakaInputs = document.querySelectorAll('.plaka-input');
        const kiloInputs = document.querySelectorAll('.kilo-input');

        let kayitlar = [];
        let sonKayitOzet = "";

        for (let i = 0; i < plakaInputs.length; i++) {
            let pVal = plakaInputs[i].value.trim();
            let kVal = kiloInputs[i].value.trim().replace(/\./g, '').replace(/,/g, '');

            if (pVal && kVal) {
                let fPlaka = formatPlaka(pVal);
                kayitlar.push({
                    tarih: document.getElementById('tarih').value.split('-').reverse().join('.'),
                    ad: fPlaka,
                    miktar: s,
                    turu: f,
                    kilo: kVal,
                    fiyat: fsn,
                    toplam: document.getElementById('tarla').value,
                    adet: document.getElementById('aciklama').value,
                    cihaz: cihazAdiVal
                });
                sonKayitOzet = `${fPlaka} • ${f} • ${s} (${Number(kVal).toLocaleString('tr-TR')} kg)`;
            }
        }

        if (kayitlar.length === 0) {
            return alert("Lütfen en az bir tane geçerli Plaka ve Kilo girin!");
        }

        // Arka planda Google'a gönder
        if (navigator.onLine) {
            fetch(scriptURL, { 
                method: 'POST', 
                mode: 'no-cors', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(kayitlar) 
            }).catch(err => console.error(err));

            localStorage.setItem('sonPlakaKayit', sonKayitOzet);
        } else {
            let mevcutOffline = JSON.parse(localStorage.getItem('offlinePlakaKayitlari') || '[]');
            mevcutOffline.push(...kayitlar);
            localStorage.setItem('offlinePlakaKayitlari', JSON.stringify(mevcutOffline));
            localStorage.setItem('sonPlakaKayit', `${sonKayitOzet} [ÇEVRİMDIŞI]`);
        }

        // Anında şimşek hızında bildirim ve temizlik
        bildirimGoster("✅ Kaydedildi!");
        formuTemizle();
        sonKaydiGoster();
    }

    function formuTemizle() {
        const container = document.getElementById('plakaKiloContainer');
        container.innerHTML = `
            <div class="plaka-kilo-row">
                <input type="text" class="plaka-input" placeholder="34ABC123" style="text-transform:uppercase; font-weight:bold; flex: 1.2;">
                <input type="text" class="kilo-input" placeholder="Örn: 25.400" style="flex: 1;">
            </div>
        `;

        document.getElementById('tarla').value = '';
        document.getElementById('aciklama').value = '';

        setTimeout(() => {
            const ilkinput = document.querySelector('.plaka-input');
            if (ilkinput) ilkinput.focus();
        }, 30);
    }
</script>

</body>
</html>
